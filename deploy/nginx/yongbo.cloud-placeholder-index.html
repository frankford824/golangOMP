<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设计流转管理系统</title>
  <style>
    :root { color-scheme: light; --fg: #1a1a1a; --muted: #5c5c5c; --line: #e5e5e5; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      color: var(--fg);
      background: #fafafa;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p { margin: 0; color: var(--muted); font-size: 0.95rem; max-width: 28rem; line-height: 1.5; }
    footer {
      border-top: 1px solid var(--line);
      padding: 1rem 1.25rem 1.25rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
      background: #fff;
    }
    footer a { color: var(--muted); text-decoration: underline; }
    footer a:hover { color: var(--fg); }
  </style>
</head>
<body>
  <main>
    <h1>设计流转管理系统</h1>
    <p>前端正式构建产物部署后，此处将由 Vue 应用替换。上线前站点与反向代理已就绪。</p>
  </main>
  <footer>
    <a href="https://beian.miit.gov.cn/" rel="noopener noreferrer" target="_blank">苏ICP备2026007026号-1</a>
  </footer>
</body>
</html>
