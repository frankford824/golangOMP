# yongbo.cloud nginx template for static frontend + MAIN API.
# Install into /etc/nginx/sites-available/yongbo.cloud and symlink into sites-enabled.
# Use certbot or your existing TLS automation for HTTPS if needed.

upstream yongbo_main_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream yongbo_upload_service {
    server 100.111.214.38:8089;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name yongbo.cloud www.yongbo.cloud;

    root /var/www/yongbo.cloud;
    index index.html;

    client_max_body_size 200m;
    client_body_timeout 300s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /health {
        proxy_pass http://yongbo_main_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ping {
        proxy_pass http://yongbo_main_api/ping;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /v1/ {
        proxy_pass http://yongbo_main_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location = /v1 {
        return 301 /v1/;
    }

    location ^~ /upload/ {
        proxy_pass http://yongbo_upload_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location = /upload {
        return 301 /upload/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
