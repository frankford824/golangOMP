      type: string
      enum: [task_query, task_board_queue, procurement_summary, warehouse_receipts]
    ExportJobStatus:
      type: string
      enum: [queued, running, ready, failed, cancelled]
    ExportJobProgressHint:
      type: string
      enum: [created, processing, download_ready, failed, cancelled]
    ExportJobStartMode:
      type: string
      enum: [explicit_internal_start]
      description: Current placeholder start-boundary mode for export jobs. This does not imply a real async runner platform.
    ExportJobExecutionMode:
      type: string
      enum: [manual_placeholder_runner]
      description: Current placeholder execution mode. Future real runners should replace this layer without changing handoff APIs.
    ExportJobDeliveryMode:
      type: string
      enum: [claim_read_refresh_handoff]
      description: Current planning-only delivery mode behind claim/read/refresh handoff APIs.
    ExportJobExecutionBoundary:
      type: object
      description: Planning-only execution-boundary read model. Clarifies which current layer starts execution, hands off dispatch, records attempts, and mints placeholder result state before any real runner platform is introduced.
      properties:
        boundary_key:
          type: string
        start_layer:
          type: string
        dispatch_layer:
          type: string
        attempt_layer:
          type: string
        result_generation_layer:
          type: string
        future_runner_replace_layer:
          type: string
        placeholder:
          type: boolean
        note:
          type: string
    ExportJobStorageBoundary:
      type: object
      description: Planning-only storage-boundary read model. Clarifies that current ready-state output is represented by `result_ref` metadata only, not real file persistence.
      properties:
        boundary_key:
          type: string
        result_source_layer:
          type: string
        storage_layer:
          type: string
        storage_ref_field:
          type: string
        future_storage_replace_layer:
          type: string
        placeholder:
          type: boolean
        note:
          type: string
    ExportJobDeliveryBoundary:
      type: object
      description: Planning-only delivery-boundary read model. Clarifies that claim/read/refresh currently deliver handoff metadata only and are the future replacement seam for a real download service.
      properties:
        boundary_key:
          type: string
        delivery_layer:
          type: string
        delivery_ref_field:
          type: string
        claim_action:
          type: string
        read_action:
          type: string
        refresh_action:
          type: string
        future_delivery_replace_layer:
          type: string
        placeholder:
          type: boolean
        note:
          type: string
    ExportJobRunnerAdapterKey:
      type: string
      enum: [manual_placeholder_adapter]
      description: Current placeholder runner-adapter identity. Future real scheduler/runner integration should replace this layer rather than the export-job lifecycle contract.
    ExportJobAttemptStatus:
      type: string
      enum: [running, succeeded, failed, cancelled]
      description: Status of one concrete export-job execution attempt, separate from the export job lifecycle.
    ExportJobDispatchStatus:
      type: string
      enum: [submitted, received, rejected, expired, not_executed]
      description: Status of one placeholder adapter-dispatch handoff, separate from both export job lifecycle and attempt lifecycle.
    ExportJobAdvanceAction:
      type: string
      enum: [start, mark_ready, fail, cancel, requeue]
    ExportSourceFilters:
      type: object
      properties:
        queue_key:
          type: string
          description: Required for `task_board_queue` export jobs so the persisted job can point back to one stable board queue definition.
        board_view:
          $ref: '#/components/schemas/TaskBoardView'
        task_id:
          type: integer
          nullable: true
        receiver_id:
          type: integer
          nullable: true
        status:
          type: string
          description: Warehouse-receipt status filter when `source_query_type=warehouse_receipts`.
    ExportResultRef:
      type: object
      description: Structured placeholder download-handoff metadata only. This is not a real NAS path, signed URL, or storage integration. Its semantics align with task-asset `storage_ref` metadata, but the models remain separate.
      properties:
        ref_type:
          type: string
        ref_key:
          type: string
        file_name:
          type: string
        mime_type:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Placeholder handoff expiry timestamp. Before expiry it can gate claim/read; after expiry refresh is required.
        is_placeholder:
          type: boolean
        note:
          type: string
    ExportJobEventSummary:
      type: object
      properties:
        event_id:
          type: string
        export_job_id:
          type: integer
        sequence:
          type: integer
        event_type:
          type: string
          description: |
            Export-job audit event type. Current runner-boundary events include
            `export_job.runner_initiated`, `export_job.started`, and attempt-result events
            such as `export_job.attempt_succeeded`, but event payload remains audit context
            only rather than a full runner log stream.
        from_status:
          $ref: '#/components/schemas/ExportJobStatus'
        to_status:
          $ref: '#/components/schemas/ExportJobStatus'
        actor_id:
          type: integer
        actor_type:
          type: string
          description: Placeholder actor source/type for the current phase.
        note:
          type: string
        created_at:
          type: string
          format: date-time
    ExportJobEvent:
      allOf:
        - $ref: '#/components/schemas/ExportJobEventSummary'
        - type: object
          properties:
            payload:
              description: Freeform audit context only. This is not a full runner log stream.
              nullable: true
    ExportJobDownloadHandoff:
      type: object
      description: |
        Structured placeholder download-handoff response for ready export jobs. This is not a real
        file-download service and does not return bytes, signed URLs, NAS paths, or object-storage handles.
        `is_expired` and `can_refresh` describe placeholder handoff lifecycle only.
      properties:
        export_job_id:
          type: integer
        status:
          $ref: '#/components/schemas/ExportJobStatus'
        download_ready:
          type: boolean
        claim_available:
          type: boolean
          description: Whether placeholder download handoff can currently be claimed.
        read_available:
          type: boolean
          description: Whether placeholder download handoff can currently be read.
        is_expired:
          type: boolean
          description: Whether the current placeholder handoff is expired.
        can_refresh:
          type: boolean
          description: Whether the current placeholder handoff can be refreshed in this phase.
        result_ref:
          $ref: '#/components/schemas/ExportResultRef'
        file_name:
          type: string
        mime_type:
          type: string
        is_placeholder:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
        claimed_at:
          type: string
          format: date-time
          nullable: true
        claimed_by_actor_id:
          type: integer
          nullable: true
        claimed_by_actor_type:
          type: string
        last_read_at:
          type: string
          format: date-time
          nullable: true
        last_read_by_actor_id:
          type: integer
          nullable: true
        last_read_by_actor_type:
          type: string
    ExportJobDownloadHandoffResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ExportJobDownloadHandoff'
    ExportJobAttempt:
      type: object
      description: |
        One placeholder execution attempt for an export job. This is not a real worker lease,
        scheduler callback, or distributed runner telemetry stream. It exists so export-job
        lifecycle and per-attempt execution state remain separately visible.
      properties:
        attempt_id:
          type: string
        export_job_id:
          type: integer
        dispatch_id:
          type: string
          description: Placeholder dispatch handoff consumed by this attempt, when available.
        attempt_no:
          type: integer
        trigger_source:
          type: string
          description: Current trigger source for this start attempt, such as explicit `/start` or backward-compatible `advance action=start`.
        execution_mode:
          $ref: '#/components/schemas/ExportJobExecutionMode'
        adapter_key:
          $ref: '#/components/schemas/ExportJobRunnerAdapterKey'
        status:
          $ref: '#/components/schemas/ExportJobAttemptStatus'
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
        adapter_note:
          type: string
          description: Placeholder adapter-side note only. This is not full runner telemetry.
        blocks_new_attempt:
          type: boolean
          description: Lightweight hint derived from this attempt status only. It does not replace job-level start/attempt admission.
        next_attempt_admission_reason:
          type: string
          description: Lightweight reason hint derived from this attempt status only.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ExportJobDispatch:
      type: object
      description: |
        One placeholder adapter-dispatch handoff for an export job. This is not a real scheduler
        queue item, lease, worker callback, or distributed delivery contract; it only makes the
        dispatch boundary explicit ahead of any future real runner platform.
      properties:
        dispatch_id:
          type: string
        export_job_id:
          type: integer
        dispatch_no:
          type: integer
        trigger_source:
          type: string
        execution_mode:
          $ref: '#/components/schemas/ExportJobExecutionMode'
        adapter_key:
          $ref: '#/components/schemas/ExportJobRunnerAdapterKey'
        status:
          $ref: '#/components/schemas/ExportJobDispatchStatus'
        submitted_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        status_reason:
          type: string
        adapter_note:
          type: string
        start_admissible:
