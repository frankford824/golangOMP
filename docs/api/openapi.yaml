        cancelled_by:
          type: integer
        remark:
          type: string
    CreateTaskReferenceUploadSessionRequest:
      type: object
      required: [filename]
      description: Creates one compatibility pre-task reference upload session. Prefer `POST /v1/tasks/reference-upload` for the formal frontend entry.
