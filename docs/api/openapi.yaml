  /v1/tasks:
    post:
      summary: Create task
      description: |
        Creates one task.
        For `original_product_development`, narrow by category or `search_entry_code`,
        call `GET /v1/erp/products`, choose one product, and submit that result through `product_selection`.
        Legacy `product_id`, `sku_code`, and `product_name_snapshot` fields remain accepted for compatibility.
        Current create rules:
        - `original_product_development` is existing-product only.
        - when `product_id` is null, backend resolves ERP/local binding before create-tx using this priority:
          `product_id` -> `product_selection.erp_product.product_id` -> `product_selection.erp_product.sku_code` -> top-level `sku_code`.
        - ERP-side codes are treated as bridge binding keys and are normalized to a local `products.id`; they are not used as local primary keys directly.
        - frontend should not send `source_mode`; backend infers it from `task_type`.
        - `new_product_development` infers `source_mode=new_product` and auto-generates `sku_code` when omitted.
        - `purchase_task` no longer depends on design/audit assumptions at entry; creation initializes a draft procurement record so read models expose procurement state immediately.
        - customization workflow is decoupled from ERP order-detail APIs; no ERP order-info matching/sync dependency is required at runtime.
        - `customization_required=true` is the canonical way to create a customization-lane task; that task enters `PendingCustomizationReview` immediately and does not pass through the normal design workbench first.
        - legacy `is_outsource` / `need_outsource` create intent is folded into the same customization lane for compatibility, but new integrations must not use those fields as workflow selectors.
        - customization-lane create now also creates one primary `customization_job` immediately so `/v1/customization-jobs` visibility exists before review approval.
        - customization classification is business-configurable through `customization_level_code` and `customization_level_name`; do not assume fixed `A/B/C` levels.
        - default task product-code rule is backend-only and fixed to `NS + category_short_code(2 uppercase letters) + 6-digit sequence`; frontend no longer configures code-rules/rule-templates for task `sku_code` generation.
        - category short code generation priority is backend-owned: explicit map first (e.g. `KT_STANDARD -> KT`), otherwise first two alphabet letters from `category_code` (uppercased), then deterministic fallback to two letters.
        - sequence allocation for default task product-code uses `(prefix, category_short_code)` scope so different `category_code` values that collapse to one short code still remain unique.
        - `batch_sku_mode=multiple` is supported only for `new_product_development` and `purchase_task`; `original_product_development` returns `400 INVALID_REQUEST` with machine-readable `error.details.violations`.
        - batch mode writes one mother task plus multiple `task_sku_items` in one transaction and keeps `sku_code` / `primary_sku_code` aligned to the first child SKU for compatibility.
        - create now also appends `task.created`, and multi-SKU creates additionally append `task.batch_items_created`.
        - `reference_images` is no longer accepted. If present, backend returns `400 INVALID_REQUEST` and requires the reference-upload flow.
        - `reference_file_refs` must be objects returned by `POST /v1/tasks/reference-upload` or the compatibility task-create asset-center flow; forged, missing, incomplete, or unauthorized refs return `400 INVALID_REQUEST` with `invalid_reference_file_refs`.
      tags: [Tasks, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R3
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Ops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TaskReadModel'
        '400':
          description: Validation error. Create-task validation may include machine-readable `error.details.violations` entries describing field-level contract mismatches, including unsupported batch mode, duplicate `batch_items`, mixed top-level single-SKU fields, and invalid batch item fields.
    get:
      summary: List tasks
      description: Returns the frontend-oriented task list with projected `workflow`, aggregated `warehouse_status`, stable `product_selection` summary, `procurement_summary`, canonical actor/source fields `requester_id/requester_name`, `creator_id/creator_name`, `designer_id/designer_name`, `current_handler_id/current_handler_name`, and task org ownership fields `owner_team`, `owner_department`, and `owner_org_team`. For `purchase_task`, `procurement_summary` carries procurement-to-warehouse coordination state plus lightweight product-selection provenance. Board queue `query_template` payloads are designed to be consumed directly by this endpoint. `workflow_lane` is the canonical list/workbench split selector for distinguishing the normal lane from the customization lane. List reads apply the current canonical-org visibility rules plus stage-based visibility for mid-lane roles (`Audit_A`, `Audit_B`, `Warehouse`, `Outsource`, `CustomizationOperator`, `CustomizationReviewer`) where the backend-authorized status set and lane match. This is not a full ABAC engine.
      tags: [Tasks, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R3
