        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/me/notifications/{id}/read:
    post:
      summary: Mark one notification as read
      description: |
        Source: V1_INFORMATION_ARCHITECTURE §8.3. Only the notification owner (`user_id = current_user`)
