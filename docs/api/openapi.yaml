          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/erp/products/by-code:
    get:
      summary: Lookup ERP product by code
      description: |
        Source: V1_CUSTOMIZATION_WORKFLOW §3.1.2. Backend-side wrapper of upstream `/open/combine/sku/query` (ERP 8081).
        Failure policy (§3.1.2): upstream 5xx / timeout → 502; upstream 'not found' → 404.
        Task creation callers MUST block on 404/502 and surface a retry or correction UX.
      tags: [ERP, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-C
      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      parameters:
        - in: query
          name: code
          required: true
          schema: { type: string }
          description: ERP product code (matches `tasks.erp_product_code`)
      responses:
        '200':
          description: ERP product snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ERPProductSnapshot'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ERP upstream reports code not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: ERP upstream 5xx / timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/design-sources/search:
    get:
      summary: Search design source entries
      description: |
        Source: V1_CUSTOMIZATION_WORKFLOW §3.2.2. v1 MVP — file_name / task_id keyword full-text search,
        ordered by created_at DESC. No advanced filters; SuperAdmin-maintained independent material
        repository deferred to R7+.
      tags: [Customization, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-C
      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      parameters:
        - in: query
          name: keyword
          schema: { type: string }
          description: Full-text match against file_name and origin_task_id.
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Design source search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DesignSourceEntry'
                  total: { type: integer }
                  page: { type: integer }
                  size: { type: integer }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/search:
    get:
      summary: Perform a global search
      description: |
        Source: V1_INFORMATION_ARCHITECTURE §4.2. Global search across tasks / assets / products / users.
        Row-level policy (R1.7-D Q1=A1 + Q2=U1): tasks/assets/products return full matches regardless
        of caller scope; `users[]` is always `[]` unless caller role ∈ {super_admin, hr_admin}.
        Backend (R1.7-D Q3=B1): v1 uses MySQL LIKE; no ES / relevance scoring in v1.
      tags: [Search, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-D
      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1 }
        - in: query
          name: scope
          schema:
            type: string
            enum: [all, tasks, assets, products, users]
            default: all
        - in: query
          name: limit
          description: Max items per result array. Default 20 (IA §4.2).
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Grouped search results
          content:
            application/json:
              schema:
                type: object
                required: [query, results]
                properties:
                  query:
                    type: string
                  results:
                    $ref: '#/components/schemas/SearchResultGroup'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/me/notifications:
    get:
      summary: List my notifications
      description: |
        Source: V1_INFORMATION_ARCHITECTURE §8.3. Cursor-based pagination; optional `is_read` filter
        (omit for 'all'). Notifications are always scoped to the authenticated user; no cross-user
        reads regardless of role.
