  /v1/tasks/{id}/submit-design:
      post:
        summary: Submit task design asset
        description: |
          Supports two submit modes:
          1) Compatibility single-asset submit (`asset_type` + `file_name`) which creates one `task_assets` record.
          2) Batch submit (`assets[]`) which completes multiple upload sessions in a single action and persists canonical
             `design_assets`/`asset_versions` with SKU scope.
          Re-entry is allowed from `RejectedByAuditA` and `RejectedByAuditB`. Delivery upload-session completion advances
          task status to `PendingAuditA` when current status is one of `PendingAssign`, `Assigned`, `InProgress`,
          `RejectedByAuditA`, or `RejectedByAuditB`, and for multi-SKU batch tasks the gate waits until required SKU-scoped
          delivery assets are complete.
          `purchase_task` cannot submit design. This action uses minimum role plus org or handler gating.
      tags: [TaskAssets, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Designer, Ops, Admin, SuperAdmin, HRAdmin, RoleAdmin, DepartmentAdmin, TeamLead, DesignDirector]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitDesignRequest'
      responses:
        '201':
          description: Design submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/TaskAsset'
                      - $ref: '#/components/schemas/SubmitDesignBatchResult'
        '400':
          description: Invalid request
        '403':
          description: "`PERMISSION_DENIED` with `deny_code` such as `task_not_assigned_to_actor`, `task_out_of_department_scope`, or `task_status_not_actionable`."
        '404':
          description: Task not found
        '409':
          description: Missing designer assignment or invalid task state
