          schema: { type: integer }
          description: Filter by target user.
        - in: query
          name: source_department_id
          schema: { type: integer }
          description: |
            Filter by source department. DeptAdmin callers are server-side forced to own managed department; this parameter is a safe filter hint and not a bypass.
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: page_size
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Org move requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrgMoveRequest'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
  /v1/org-move-requests/{id}/approve:
    post:
      summary: Approve an org move request
      description: |
        SuperAdmin confirms a pending org-move-request. On approval the target user's `department` / `team` are updated and audit event `user_department_changed_by_admin` is emitted. Source: V1_INFORMATION_ARCHITECTURE §5.2.
