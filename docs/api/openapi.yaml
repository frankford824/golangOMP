          type: string
          description: Optional canonical task owner department hint. When provided with `owner_org_team` or a compatible org-team `owner_team`, backend validates consistency before create.
        owner_org_team:
          type: string
          description: Optional canonical task owner org-team hint. When omitted, backend may resolve it from `owner_team` when the mapping is deterministic.
