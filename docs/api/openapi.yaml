  /v1/erp/products/upsert:
    post:
      summary: Upsert ERP Bridge product (Bridge-side write endpoint)
      description: |
        Bridge-side write endpoint that accepts ordinary product-profile upsert payloads from MAIN.
        MAIN calls this internally via `ERP_BRIDGE_BASE_URL` when `filed_at` is set
        on an existing-product task. In the current v0.4 architecture, Bridge uses a
        `localERPBridgeClient` that persists directly to the shared MySQL database
        rather than calling an external ERP API.
        As of 2026-03-17, Bridge also supports a config-driven remote mode:
        `ERP_REMOTE_MODE=local|remote|hybrid`.
        - `local`: keep local DB writeback
        - `remote`: upsert is sent to configured external ERP API
        - `hybrid`: remote first, optional local fallback by env switch
        OpenWeb official mapping used by Bridge remote mode:
        - `POST /v1/erp/products/upsert` -> `/open/webapi/itemapi/itemsku/itemskubatchupload`
        - `POST /v1/erp/products/style/update` -> `/open/webapi/itemapi/itemskuim/itemupload`
        - OpenWeb signature parameters are:
          `app_key`, `access_token`, `timestamp`, `charset`, `version`, `biz`
          (`sign` excluded from signing), sorted by key and signed as:
          `md5(app_secret + key1value1key2value2...)` (lowercase hex)
        Combined-SKU upload endpoint `/open/item/combinesku/upload` is intentionally
        not auto-selected in current Bridge contract because this payload currently has
        no explicit "combined SKU" discriminator; Bridge keeps ordinary-SKU mapping
        deterministic to avoid accidental wrong-endpoint writes.
        Current live production mode is `hybrid`; do not assume every write endpoint has
        remote success without upstream response evidence for that endpoint.
        This route was added in ITERATION_070 to fix a 404 gap that prevented all
        MAIN -> Bridge filing calls from succeeding.
        Requires session authentication (Bearer token forwarded from MAIN).
      tags: [ERPBridge, InternalBridge]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ERPProductUpsertPayload'
      responses:
        '200':
          description: Product upserted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ERPProductUpsertResult'
        '400':
          description: Invalid payload or missing required fields (sku_id required)
        '401':
          description: Authentication required
        '500':
          description: Internal error during upsert
