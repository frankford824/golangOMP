  /v1/erp/products:
    get:
      summary: Search ERP Bridge products
      description: |
        Frontend-ready MAIN facade over Bridge(8081). **Primary chain**: Bridge `remote`/`hybrid` calls Jushuitan OpenWeb POST `ERP_REMOTE_SKU_QUERY_PATH` (live ERP). Local `products` is **not** the search source of truth; hybrid may fall back to local `products` only on transient upstream failure (5xx/timeout), never on OpenWeb business errors or auth misconfiguration. Server logs: `erp_bridge_product_search` (`remote_ok` vs `fallback_local_products`).
        **8080 `products` table**: sync replica / mapping cache / business read-model (ERP_SYNC_SOURCE_MODE=jst via OpenWeb provider), not the picker primary index.
        Current search boundary:
        - keyword / q: supported; implemented as the current bridge's contains-match style lookup rather than semantic/global search
        - sku_code: supported as an exact filter after MAIN normalization
        - category_id / category_name: supported as exact filters after MAIN category validation and local refinement
        - browse: supported
        - sorting: not supported
        - search suggestion / association: not supported
        - global search: not supported
        Contract guarantees for result-page integration:
        - product_id is the stable lookup key emitted by this list and accepted by /v1/erp/products/{id}
        - sku_code, category_name, category_code, product_short_name, image_url may be empty strings when upstream data is absent
        - empty image_url means frontend should render its own placeholder image
        - when category_id / category_name is invalid or does not exist, MAIN returns an empty list instead of falling back to browse
        - when a result is chosen, frontend should pass the returned object into task product_selection.erp_product; backend will cache/bind it to a local products.id
      tags: [ERPBridge, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
      parameters:
        - in: query
          name: q
          description: Keyword search string. This is the primary original-product selection entry and should be preferred over bridge category-only browsing.
          schema: { type: string }
        - in: query
          name: keyword
          description: Additive compatibility alias for `q`. When `q` is empty, backend normalizes this into the effective keyword query.
          schema: { type: string }
        - in: query
          name: sku_code
          description: Exact sku-code filter. MAIN may reuse a code-like upstream id as sku_code when bridge does not emit a dedicated field.
          schema: { type: string }
        - in: query
          name: category_id
          description: Exact category filter using the normalized category id from /v1/erp/categories.
          schema: { type: string }
        - in: query
          name: category_name
          description: Exact category-name filter. MAIN validates the value against /v1/erp/categories; unknown values return an empty list.
          schema: { type: string }
        - in: query
          name: category
          description: Compatibility alias for `category_name`.
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: ERP product list normalized by MAIN for stable frontend result-page integration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ERPBridgeProduct'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                  normalized_filters:
                    $ref: '#/components/schemas/ERPBridgeProductSearchFilter'
        '404':
          description: ERP Bridge upstream product path not found
        '500':
          description: ERP Bridge unavailable or upstream returned a non-200 response. Error details may now include timeout/retry-hint diagnostics for internal observability.
