      description: |
        Lists org-move-requests for the SuperAdmin review queue. Source: V1_INFORMATION_ARCHITECTURE §5.2.
      tags: [Org, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-B
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [SuperAdmin, HRAdmin, DepartmentAdmin]
