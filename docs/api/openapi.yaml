    CreateTaskAssetUploadSessionRequest:
      type: object
      description: |
        `task_id` is required on the top-level `/v1/assets/upload-sessions` route and ignored on task-scoped compatibility routes.
        New frontend integrations should send one upload intent and let the backend choose `upload_strategy`.
        `asset_kind` and `asset_type` are equivalent inputs; `asset_kind` is the canonical frontend-facing name.
        `upload_mode` is compatibility-only and must not be used by new frontend integrations as strategy selector.
        `reference` assets use single-part upload internally. `source`, `delivery`, `preview`, and `design_thumb` use multipart internally.
        `source_asset_id` is used for backend-owned preview/thumb derivatives and links them to a source asset.
        For multi-SKU batch tasks, non-reference uploads must pass `target_sku_code` to bind the uploaded
        design asset to one child SKU.
        Asset-center upload sessions now return OSS-backed remote upload instructions.
        Frontend uploads bytes using the returned remote plan, then calls `complete`.
      properties:
        task_id:
          type: integer
          nullable: true
          description: Required on `POST /v1/assets/upload-sessions`; ignored on task-scoped compatibility routes where task context comes from path.
        created_by:
          type: integer
        asset_id:
          type: integer
          nullable: true
        source_asset_id:
          type: integer
          nullable: true
          description: Optional linkage to a source asset. Allowed for `preview` and `design_thumb` intents.
        asset_type:
          type: string
          enum: [reference, source, delivery, preview, design_thumb]
          description: Compatibility alias of `asset_kind` retained for migration safety.
        asset_kind:
          type: string
          enum: [reference, source, delivery, preview, design_thumb]
          description: Canonical upload intent field for new frontend integrations.
        upload_mode:
          $ref: '#/components/schemas/DesignAssetUploadMode'
          description: Compatibility-only input. New frontend integrations must not send this field.
        filename:
          type: string
          description: Compatibility alias of `file_name`. At least one of `file_name` or `filename` must be provided.
        file_name:
          type: string
          description: Canonical file name field for new frontend integrations. At least one of `file_name` or `filename` must be provided.
        expected_size:
          type: integer
          format: int64
          nullable: true
          description: Optional size hint in bytes.
        file_size:
          type: integer
          format: int64
          nullable: true
          description: Optional compatibility alias of `expected_size`.
        mime_type:
          type: string
          description: Optional MIME hint.
        file_hash:
          type: string
        remark:
          type: string
        target_sku_code:
          type: string
          description: Required for multi-SKU batch-task non-reference uploads. Backend validates that the SKU belongs to the task, returns it on the upload-session business view as `target_sku_code`, and persists the completed asset scope on `scope_sku_code` for the asset root and asset version.
    CreateTaskAssetUploadSessionResponseData:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/UploadSession'
        remote:
          $ref: '#/components/schemas/RemoteUploadSessionPlan'
        upload_strategy:
          type: string
          description: Canonical frontend-facing upload strategy label. Current runtime emits `single_part` or `multipart`; `single_part` corresponds to internal `upload_mode=small`.
        required_upload_content_type:
          type: string
          description: Exact `Content-Type` value that the browser must send on OSS direct PUT and echo on `complete` as `upload_content_type`.
        complete_endpoint:
          type: string
          description: Canonical completion endpoint returned by the session creator.
        cancel_endpoint:
          type: string
          description: Canonical cancellation endpoint returned by the session creator.
    CreateAssetUploadSessionRequestCanonical:
      allOf:
        - $ref: '#/components/schemas/CreateTaskAssetUploadSessionRequest'
        - type: object
          required: [task_id, asset_kind]
          properties:
            task_id:
              type: integer
              minimum: 1
            asset_kind:
              type: string
              enum: [reference, source, delivery, preview, design_thumb]
            file_name:
              type: string
              minLength: 1
            filename:
              type: string
              minLength: 1
          anyOf:
            - required: [file_name]
            - required: [filename]
    CompleteTaskAssetUploadSessionRequest:
      type: object
      properties:
        completed_by:
          type: integer
        file_hash:
          type: string
        upload_content_type:
          type: string
          description: Exact `required_upload_content_type` echoed back by the client when finalizing an OSS direct upload.
        remark:
          type: string
    CompleteTaskAssetUploadSessionResponseData:
