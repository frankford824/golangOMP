  /v1/tasks/{id}/assign:
    post:
      summary: Assign task to designer
      description: |
        `POST /v1/tasks/{id}/assign` now carries two bounded semantics under the same route:
        - `PendingAssign`: assign is allowed for the existing operation/management path within the allowed org scope. Success sets `designer_id` and `current_handler_id`, then moves the task to `InProgress`.
        - `InProgress`: the same route acts as reassign. Allowed actors are requester/initiator (`requester_id` or `creator_id`), the current owning-group `TeamLead`, and scoped management roles (`DepartmentAdmin`, `DesignDirector`, `RoleAdmin`, `HRAdmin`, `SuperAdmin`, `Admin`). Ordinary Ops users without those conditions are denied.
        - Audit / warehouse / close states remain denied with machine-readable `PERMISSION_DENIED` details such as `task_not_reassignable`.
        - `purchase_task` cannot be assigned or reassigned to a designer.
      tags: [Tasks, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Ops, Admin, SuperAdmin, HRAdmin, RoleAdmin, DepartmentAdmin, TeamLead, DesignDirector]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTaskRequest'
      responses:
        '200':
          description: Task assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '403':
          description: "`PERMISSION_DENIED` with machine-readable task-action details such as `missing_required_role`, `task_out_of_department_scope`, `task_out_of_team_scope`, `task_not_reassignable`, or `task_reassign_requires_requester_or_manager`."
        '404':
          description: Task not found
        '409':
          description: Invalid task state such as attempting designer assignment on `purchase_task`
