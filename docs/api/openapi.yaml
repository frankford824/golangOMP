          nullable: true
    ERPBridgeProduct:
      type: object
      description: Normalized ERP product contract returned by the MAIN facade. `product_id` is the stable lookup key emitted by `GET /v1/erp/products` and accepted by `GET /v1/erp/products/{id}`. Empty strings mean the backend could not obtain that field from bridge/category normalization; frontend should render its own placeholder for empty `image_url`.
      properties:
        product_id:
          type: string
          description: Opaque ERP facade lookup key returned by list and accepted by detail/binding flows.
        sku_id:
          type: string
          description: Canonical ERP SKU identifier.
        i_id:
          type: string
          description: Canonical ERP style identifier.
        sku_code:
          type: string
          description: Compatibility display code. This is not equivalent to `sku_id` or `i_id`.
        name:
          type: string
          description: Canonical ERP product display name.
        product_name: { type: string }
        short_name:
          type: string
          description: Canonical ERP short name.
        category_id:
          type: string
          description: Canonical category id resolved by MAIN when the category catalog can map the item; otherwise empty string.
        category_code:
          type: string
          description: Current minimal category code for result-page display/filter echo. When available it equals the resolved category id.
        category_name:
          type: string
          description: Display-ready category name. Empty string means bridge/category normalization had no category match.
        product_short_name:
          type: string
          description: Optional upstream short name. Empty string means bridge did not expose one.
        image_url:
          type: string
          description: Display image URL. Empty string means no image was available and frontend should render its own placeholder.
