          allOf: [{ $ref: '#/components/schemas/TaskProductSelectionContext' }]
          nullable: true
        change_request:
          type: string
        category_code:
          type: string
          description: Backend-owned compatibility category/cost/SKU-prefix field. New frontend creation should prefer `i_id`; backend may resolve an internal `category_code` from `i_id` when possible.
        i_id:
          type: string
          description: Canonical frontend selector for product family/style. For new-product and purchase-task creation, pass a value selected from `GET /v1/erp/iids`.
        product_i_id:
          type: string
          description: Compatibility alias for `i_id`.
