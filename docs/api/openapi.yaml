          format: double
          nullable: true
        area:
          type: number
          format: double
          nullable: true
        quantity:
          type: integer
          format: int64
          nullable: true
        process: { type: string }
        product_selection:
          allOf: [{ $ref: '#/components/schemas/TaskProductSelectionContext' }]
          nullable: true
        cost_price:
          type: number
          format: double
          nullable: true
          description: Optional current effective cost. If `manual_cost_override=true`, this becomes the manual override value; otherwise the backend prefers system prefill when available.
