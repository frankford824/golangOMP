          type: string
        email:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
          description: |
            R1.7-B placeholder. The server accepts but currently ignores this field (no `users.avatar_url` column in v1 DDL). Full persistence is scheduled for R5+.
    ChangePasswordRequest:
      type: object
      description: "Source: V1_INFORMATION_ARCHITECTURE §7.2 (安全 · 改密). R4-SA-B."
      required: [old_password, new_password, confirm]
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 8
        confirm:
          type: string
          minLength: 1
          description: Must equal `new_password`; server enforces equality.
    CreateOrgMoveRequestPayload:
      type: object
      description: "Source: V1_INFORMATION_ARCHITECTURE §5.2 (DeptAdmin 发起跨部门移出). R4-SA-B."
      required: [user_id, target_department_id, reason]
      properties:
        user_id:
          type: integer
          description: The user being moved. Must currently belong to the source department identified in the path.
        target_department_id:
          type: integer
          nullable: true
          description: Destination department; nullable means unassigned-pool.
        reason:
          type: string
          minLength: 1
    RejectReasonRequest:
      type: object
      description: "Source: V1_INFORMATION_ARCHITECTURE §5.2 (SuperAdmin 驳回 org-move-request). R4-SA-B."
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
    L1Card:
      type: object
      description: |
        Source: V1_INFORMATION_ARCHITECTURE §1 一级菜单「报表」 + V1_MODULE_ARCHITECTURE §12 U 表.
        R1.7-D decision (Q6=C1): v1 直查 `task_module_events` + `tasks`,不建物化表;
        R6+ 视性能再升级到汇总表。
      properties:
        key:
          type: string
          description: Stable card key (e.g. `tasks_in_progress`, `tasks_completed_today`).
        title:
          type: string
        value:
          type: number
        unit:
          type: string
          nullable: true
        delta:
          type: number
          nullable: true
          description: Change vs previous period; null when no baseline available.
    AssetReasonRequest:
      type: object
      description: "Source: V1_ASSET_OWNERSHIP §5.4 (delete) / §7.3 (archive). R4-SA-A."
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
    AssetVersion:
      type: object
      description: "Single asset version entry. Source: V1_ASSET_OWNERSHIP §4 / §5.2."
      properties:
        version_id:
          type: integer
        version_no:
          type: integer
        storage_key:
          type: string
          nullable: true
          description: Null when lifecycle_state ∈ {auto_cleaned, deleted}.
        file_size:
          type: integer
          format: int64
          nullable: true
        mime_type:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        created_by:
          $ref: '#/components/schemas/Actor'
    AssetDetail:
      type: object
      description: "Source: service/asset_center.AssetDetail — detail endpoint returns asset + version list."
      properties:
        id:
          type: integer
        task_id:
          type: integer
        asset_no:
          type: string
        scope_sku_code:
          type: string
        asset_type:
          type: string
        current_version_id:
          type: integer
          nullable: true
        source_module_key:
          type: string
        lifecycle_state:
          $ref: '#/components/schemas/AssetLifecycleState'
        archive_status:
          type: string
        upload_status:
          $ref: '#/components/schemas/DesignAssetUploadStatus'
        storage_key:
          type: string
          nullable: true
        file_name:
          type: string
        original_filename:
          type: string
        file_size:
          type: integer
          format: int64
          nullable: true
        mime_type:
          type: string
        task_no:
          type: string
        task_status:
          type: string
        owner_team_code:
          type: string
        created_by:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        versions:
          type: array
          items:
            $ref: '#/components/schemas/AssetVersion'
        archived_at:
          type: string
          format: date-time
          nullable: true
        archived_by:
          allOf: [{ $ref: '#/components/schemas/Actor' }]
          nullable: true
        cleaned_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
paths:
  /v1/auth/register:
    post:
      summary: Register workflow user
      description: |
        Frontend-ready registration endpoint for the current minimal auth mainline. Registration now
        accepts explicit profile fields (`name`, `department`, optional `team`, `mobile`, optional
        `email`, `account`, `password`, optional admin key). Department must match the backend org
        master exposed by `/v1/org/options`. If `team` is provided it must belong to the selected department. `mobile`
        is validated and kept unique. If the provided admin key matches the configured department rule,
        the new user is granted `DepartmentAdmin`. The response includes `user.frontend_access`.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, name, department, mobile, password]
              properties:
                username: { type: string, description: Compatibility alias of account }
                account: { type: string }
                display_name: { type: string }
                name: { type: string }
                department:
                  $ref: '#/components/schemas/Department'
                team: { type: string }
                group: { type: string, description: Compatibility alias of team }
                mobile: { type: string }
                phone: { type: string, description: Compatibility alias of mobile }
                email: { type: string }
                password: { type: string }
                admin_key:
                  type: string
                  description: |
                    Department admin registration key. If a valid department admin key is provided,
                    the user is registered as a department admin (role: dept_admin) for the specified
                    department. If omitted or invalid, the user is registered as a regular member.
                    Super admin accounts are NOT created through self-registration; they are managed
                    via auth_identity.json configuration (super_admins section).
                secret_key: { type: string, description: Compatibility alias of admin_key }
      responses:
        '201':
          description: User registered and logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthResult'
        '400':
          description: Invalid registration payload, invalid department/team/mobile/email, or duplicate account/mobile
  /v1/auth/register-options:
    get:
      summary: Get registration department/team options
      description: |
        Returns the current enabled backend org-master department list plus enabled teams per department
        for frontend register-form initialization. Departments without active teams return an empty `teams` array.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RegistrationOptions'
  /v1/org/options:
    get:
      summary: Get organization options
      description: |
        Returns the backend org master source used by user-management, task org validation, owner-team
        compatibility bridging, and frontend org-assignment flows.
        The canonical response shape is top-level `departments[]`, where each department carries a nested `teams[]`
        array. That nested department tree is authoritative for `PATCH /v1/users/{id}` department/team updates and for
        org values accepted by task create.
        `teams_by_department` remains a deprecated compatibility mirror in v1.8 only; responses that still include it
        emit `Deprecation: version="v1.8"`.
        User responses return both `team` and compatibility alias `group` with the same value.
        Read access is available to company-level managers, department managers, and legacy org/role compatibility admins.
        The v1.0 official baseline exposed here is exactly:
        `人事部` -> `人事管理组`;
        `运营部` -> `淘系一组`, `淘系二组`, `天猫一组`, `天猫二组`, `拼多多南京组`, `拼多多池州组`;
        `设计研发部` -> `默认组`;
        `定制美工部` -> `默认组`;
        `审核部` -> `普通审核组`, `定制审核组`;
        `云仓部` -> `默认组`;
        plus the `未分配` / `未分配池` system bucket.
        Legacy operations groups 1-7 and legacy compatibility departments are intentionally filtered out by the `enabled=1` projection.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Admin, SuperAdmin, HRAdmin, DepartmentAdmin, OrgAdmin, RoleAdmin]
      responses:
        '200':
          description: Organization options
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrgOptions'
        '403':
          description: Permission denied
  /v1/org/departments:
    post:
      summary: Create organization department
      description: Creates one enabled department in backend org master. Newly created departments appear in `/v1/org/options` and become valid user/task org values immediately after creation.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [HRAdmin, SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgDepartmentRequest'
      responses:
        '201':
          description: Department created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrgDepartment'
        '400':
          description: Invalid request payload or department already exists
        '403':
          description: Permission denied
  /v1/org/departments/{id}:
    put:
      summary: Update organization department
      description: Updates one backend org department. Current runtime semantic is enable/disable only; disabling is rejected while users are still assigned or enabled child teams still exist.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [HRAdmin, SuperAdmin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgDepartmentRequest'
      responses:
        '200':
          description: Department updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrgDepartment'
        '400':
          description: Invalid request payload or department cannot be disabled yet
        '403':
          description: Permission denied
        '404':
          description: Department not found
  /v1/org/teams:
    post:
      summary: Create organization team
      description: Creates one enabled team in backend org master under the specified department. Newly created teams appear in `/v1/org/options` and become valid user/task org values immediately after creation.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [HRAdmin, SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrgTeam'
        '400':
          description: Invalid request payload, team already exists, or department is invalid
        '403':
          description: Permission denied
  /v1/org/teams/{id}:
    put:
      summary: Update organization team
      description: Updates one backend org team. Current runtime semantic is enable/disable only; disabling is rejected while users are still assigned to that team.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [HRAdmin, SuperAdmin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgTeamRequest'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrgTeam'
        '400':
          description: Invalid request payload or team cannot be disabled yet
        '403':
          description: Permission denied
        '404':
          description: Team not found
  /v1/auth/login:
    post:
      summary: Login workflow user
      description: |
        Login endpoint for local session-token auth. Returns a bearer token backed by persisted
        `user_sessions` rows. This contract does not introduce SSO, org sync, or external identity
        providers. The response includes `session_id` plus the current frontend permission contract
        under `user.frontend_access`.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: Workflow user login name. Runtime handler binds this as the primary field.
                account:
                  type: string
                  description: Compatibility alias of `username`.
                password:
                  type: string
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthResult'
        '401':
          description: Invalid account or password
  /v1/auth/me:
    get:
      summary: Get current authenticated user
      description: |
        Returns the current bearer-session user. Debug headers are not accepted as a substitute for
        login on this route. `data.frontend_access` is the explicit frontend-ready contract for page,
        menu, action, scope, role, department, and team gating.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        session_required: true
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkflowUser'
        '401':
          description: Authentication required
  /v1/auth/password:
    put:
      summary: Change current user password
      description: |
        Session-backed current-user password change endpoint. Requires `old_password` verification and
        validates `new_password` with the same minimum password rules used during registration.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string }
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string }
        '400':
          description: Invalid new password
        '401':
          description: Authentication required or old password incorrect
  /v1/roles:
    get:
      summary: List role catalog
      description: Minimal role/permission catalog for the current auth/org scope. Read access is available to management roles, including DepartmentAdmin, plus legacy org/role compatibility admins.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Admin, SuperAdmin, HRAdmin, DepartmentAdmin, OrgAdmin, RoleAdmin]
      responses:
        '200':
          description: Available workflow roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoleCatalogEntry'
        '403':
          description: Permission denied
  /v1/access-rules:
    get:
      summary: List protected route access rules
      description: Super-admin or HR inspection endpoint for the current route-to-role authorization contract, including whether a route is session-only or still debug-compatible placeholder scope.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
      responses:
        '200':
          description: Protected route access rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RouteAccessRule'
        '403':
          description: Permission denied
  /v1/users:
    get:
      summary: List workflow users
      description: |
        Management-scoped user-management read endpoint. Returns user department, team, role, and frontend access state for frontend integration, with server-side pagination and filtering.
        `DepartmentAdmin` reads are forced to own department.
        `TeamLead` reads are forced to own team inside own department.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-B
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Admin, SuperAdmin, HRAdmin, DepartmentAdmin, TeamLead, OrgAdmin, RoleAdmin]
      parameters:
        - in: query
          name: keyword
          schema: { type: string }
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/UserStatus'
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/V7Role'
        - in: query
          name: department
          schema:
            type: string
          description: Must match `/v1/org/options`.
        - in: query
          name: team
          schema:
            type: string
          description: Must match the selected department in `/v1/org/options`.
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: page_size
          schema: { type: integer }
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowUser'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      summary: Create workflow user
      description: |
        Managed user creation endpoint. Validates org fields against `/v1/org/options`, validates roles against the workflow role catalog,
        sets the initial password hash, and returns the created user with `frontend_access`. If `status` is omitted the user is created as `active`.
        `DepartmentAdmin` can create users only inside own department and only with department-compatible business roles.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-B
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [HRAdmin, SuperAdmin, DepartmentAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkflowUser'
  /v1/users/designers:
    get:
      summary: List designers
      description: |
        Returns users with Designer role for task creation/assignment dropdowns. Prefer this over filtering the full user list.
        Round C (v1.5) widens the route guard so Ops task creators plus HR/SuperAdmin can look up designers cross-department.
        `DepartmentAdmin` is intentionally NOT in the guard list: cross-department designer lookup is an Ops-style capability only. DepartmentAdmin remains scoped by `authorizeUserListFilter` on the canonical `/v1/users` path.
        As of v1.6 (Round D), this endpoint uses a dedicated assignment-candidate-pool service path (`IdentityService.ListAssignableDesigners`) that bypasses the standard user-list authorization filter. By default it remains restricted to `role=Designer` + `status=active` and does NOT accept department/team/keyword or pagination parameters. Round N adds `workflow_lane` to select the candidate-pool lane while preserving no-parameter backward compatibility. The route guard listed in `x-rbac-placeholder.required_roles` is the sole access control for this method; the service path performs no additional department/team scoping. Response envelope is `{data, pagination}` where `pagination.page_size` and `pagination.total` both reflect the full returned list length (no server-side pagination).
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Ops, Designer, CustomizationOperator, Admin, HRAdmin, SuperAdmin]
      parameters:
        - in: query
          name: workflow_lane
          required: false
          description: "Selects the assignment candidate pool lane. `normal` (default, back-compat) returns active users with role=Designer. `customization` returns active users with role=CustomizationOperator. `all` returns the union."
          schema:
            type: string
            enum: [normal, customization, all]
            default: normal
      responses:
        '200':
          description: Designer list (id, username, display_name)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        username: { type: string }
                        display_name: { type: string }
                  pagination:
                    type: object
                    properties:
                      page: { type: integer, example: 1 }
                      page_size: { type: integer }
                      total: { type: integer }
  /v1/users/{id}:
    get:
      summary: Get workflow user
      description: |
        Management-scoped user detail read endpoint.
        `DepartmentAdmin` can read only users in own department.
        `TeamLead` can read only users in own team.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [Admin, SuperAdmin, HRAdmin, DepartmentAdmin, TeamLead, OrgAdmin, RoleAdmin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WorkflowUser'
        '404':
          description: User not found
    patch:
      summary: Update workflow user
      description: |
        Partial update for user profile and org affiliation.
        Org-field contract:
        - `department` + `team` are the canonical write fields.
        - `group` is a compatibility alias of `team` (when both are provided they must be equal).
        - To remove a user from a formal group, use the unassigned-pool semantic:
          - set `department` to the unassigned department from `/v1/org/options`
          - set `team` (or `group`) to its unassigned pool team.
        - Compatibility alias: `team/group = "ungrouped"` is normalized by backend into the configured unassigned pool.
        `DepartmentAdmin` can move users across teams inside own department and assign unassigned users into own department, but cannot move users across departments or mutate managed scope.
      tags: [ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-B
      x-rbac-placeholder:
        auth_mode: session_token_role_enforced
        required_roles: [HRAdmin, SuperAdmin, DepartmentAdmin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Partial user update. Field-level authorization is enforced per V1_INFORMATION_ARCHITECTURE §5.4.
              properties:
                display_name: { type: string }
                status:
                  $ref: '#/components/schemas/UserStatus'
                employment_type:
                  $ref: '#/components/schemas/EmploymentType'
                department:
                  $ref: '#/components/schemas/Department'
                team:
                  type: string
                group:
                  type: string
                  description: Compatibility alias of team.
                email:
                  type: string
                  nullable: true
                mobile:
                  type: string
                avatar:
                  type: string
                  nullable: true
                  description: |
                    R1.7-B placeholder. Server currently ignores this field (no `users.avatar_url` column in v1 DDL). Full persistence is scheduled for R5+.
                roles:
                  type: array
                  description: |
                    Role assignment per V1_INFORMATION_ARCHITECTURE §5.4. DeptAdmin cannot grant SuperAdmin or DeptAdmin; HRAdmin cannot grant SuperAdmin.
                  items:
                    $ref: '#/components/schemas/V7Role'
                managed_departments:
                  type: array
                  items:
                    type: string
                managed_teams:
                  type: array
                  items:
                    type: string
                team_codes:
                  type: array
                  description: |
                    R1.7-B placeholder. v1 persists only the single `team` field plus `managed_teams[]`; multi-team membership deferred to R5+. The server accepts but currently ignores this array (no-op). IA §5.4 reference maintained for forward-compat.
                  items:
                    type: string
