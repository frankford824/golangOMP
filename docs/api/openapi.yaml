          schema: { type: integer }
        - in: path
          name: version_id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Asset version download metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AssetDownloadInfo'
        '404':
          description: Asset deleted or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Asset version auto-cleaned (V1_ASSET_OWNERSHIP §7.4)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/assets/{asset_id}/archive:
