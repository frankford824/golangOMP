  /ws/v1:
    get:
      summary: Open v1 websocket channel
      description: |
        WebSocket upgrade endpoint. Bearer token authentication required (same token as REST APIs).
        Frame contract authoritatively defined in V1_INFORMATION_ARCHITECTURE §9 (触发范围 + 实现):
          - message format: `{ "type": "...", "payload": {...} }`
          - v1 event types: `task_pool_count_changed`, `my_task_updated`, `notification_arrived`
          - disconnect fallback: frontend polls every 15s
        This OpenAPI spec only describes the HTTP upgrade handshake; async frame schemas are out of OpenAPI 3.0 scope.
      tags: [Realtime, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-C
      x-rbac-placeholder:
        auth_mode: bearer_authenticated
      responses:
        '101': { description: Switching protocols }
        '400':
          description: Websocket upgrade failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
