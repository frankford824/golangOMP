          type: string
          format: date-time
        deadline_at:
          type: string
          format: date-time
          nullable: true
        creator_id:
          type: integer
          nullable: true
        operator_group_id:
          type: integer
          nullable: true
        designer_id:
          type: integer
          nullable: true
        priority:
          type: string
          enum: [low, normal, high, critical]
        is_outsource:
          type: boolean
          description: Compatibility-only legacy create flag. When true, backend normalizes the request into `customization_required=true`.
        customization_required:
          type: boolean
          description: Canonical creation-time customization lane selector. When true, task enters customization review directly, bypasses the normal design workbench, and immediately gets one primary `customization_job`.
        customization_source_type:
          type: string
          enum: [new_product, existing_product]
          nullable: true
          description: Business source classification inside the customization lane; it does not select the lane by itself.
        reference_file_refs:
          type: array
          description: Reference file ref objects returned by `POST /v1/tasks/reference-upload` or the compatibility upload flow. Object arrays are the formal contract. `POST /v1/tasks` rejects direct `reference_images` payloads with `400 INVALID_REQUEST`.
