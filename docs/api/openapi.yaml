        upload_request_id:
          type: string
        filename:
          type: string
        mime_type:
          type: string
        file_size:
          type: integer
          format: int64
          nullable: true
        url:
          type: string
          nullable: true
          description: Compatibility-only alias of `download_url`. Obsolete for frontend rollout; new integration must consume `download_url`.
        download_url:
          type: string
          nullable: true
          description: Signed download URL. For OSS Direct-backed references, this URL is short-lived (default 15 minutes, see download_url_expires_at). Consumers SHOULD refresh via GET /v1/tasks/{id} when the URL expires or when a 403/404 is observed.
        storage_key:
