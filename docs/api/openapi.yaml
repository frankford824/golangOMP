      x-rbac-placeholder:
        auth_mode: session_token_authenticated
        allowed_roles: [super_admin]
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, format: date }
          description: Start of the report window (inclusive, ISO 8601 date).
        - in: query
          name: to
          required: true
          schema: { type: string, format: date }
          description: End of the report window (inclusive, ISO 8601 date).
        - in: query
          name: department_id
          schema: { type: integer, format: int64 }
          description: Optional filter by owning department.
        - in: query
          name: task_type
          schema: { type: string }
          description: Optional filter by task type key.
      responses:
        '200':
          description: Throughput report
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [date, created, completed, archived]
                      properties:
                        date:
                          type: string
                          format: date
                        created:
                          type: integer
                        completed:
                          type: integer
                        archived:
                          type: integer
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Forbidden. `deny_code=reports_super_admin_only`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
