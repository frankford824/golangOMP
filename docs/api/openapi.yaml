  /v1/assets/search:
    get:
      summary: Search assets across tasks
      description: Cross-task asset search for the asset management center. Source V1_ASSET_OWNERSHIP §5.2 / §5.3.
      tags: [Assets, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-A
      parameters:
        - in: query
          name: keyword
          description: Fuzzy match file_name / task_no / task title.
          schema: { type: string }
        - in: query
          name: module_key
          description: Restrict to one source module.
          schema:
            type: string
            enum: [basic_info, design, audit, warehouse, customization, procurement, retouch]
        - in: query
          name: owner_team_code
          description: Restrict to one owner team.
          schema: { type: string }
        - in: query
          name: is_archived
          description: Archive filter. Default `false`. `all` returns active + archived.
          schema:
            type: string
            enum: ['true', 'false', 'all']
            default: 'false'
        - in: query
          name: task_status
          description: Task lifecycle filter.
          schema:
            type: string
            enum: [open, closed, archived, all]
            default: all
        - in: query
          name: created_from
          description: Inclusive lower bound for asset created_at.
          schema: { type: string, format: date-time }
        - in: query
          name: created_to
          description: Inclusive upper bound for asset created_at.
          schema: { type: string, format: date-time }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Asset search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
  /v1/assets/{asset_id}/versions/{version_id}/download:
    get:
      summary: Download a specific asset version
