      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-C
      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      parameters:
        - in: query
          name: is_read
          schema: { type: boolean }
          description: Optional filter; omit to return both read and unread.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: cursor
          schema: { type: string }
          description: Opaque cursor returned by a previous page; omit for first page.
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  next_cursor:
                    type: string
