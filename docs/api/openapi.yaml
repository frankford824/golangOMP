openapi: 3.0.3
info:
  title: Design Flow V7 API
  version: 0.90.0
  description: |
    Current v0.9 MAIN backend contract.
    Read this OpenAPI together with:
    - `docs/V0_9_BACKEND_SOURCE_OF_TRUTH.md` for route classification and compatibility governance
    - `transport/http.go` for the mounted runtime
    Current canonical families include:
    - `/v1/auth/*`
    - `/v1/users*`
    - `/v1/erp/products*`
    - `/v1/tasks*`
    - `/v1/tasks/{id}/asset-center/*`
    Compatibility and deprecated routes remain documented only so existing callers can migrate safely.
    New frontend or new integrations must not start on deprecated or compatibility-only operations.
servers:
  - url: /
tags:
  - name: ReadyForFrontend
    description: V7 endpoints ready for frontend integration in the current iteration.
  - name: ERPBridge
    description: Frontend-ready MAIN facade over the Bridge-owned ERP/JST adapter query surface. Keyword search is the primary original-product picker entry; bridge categories are auxiliary only and must not block selection when incomplete. Same-host deployment should point `ERP_BRIDGE_BASE_URL` at loopback unless a different local ingress is intentional. Bridge owns adapter query semantics and ERP mutation execution. Raw ERP mutation APIs are not exposed here as general MAIN routes.
  - name: CategoryCenter
    description: Configurable category center skeleton. Explicitly models first-level ERP search-entry semantics through `search_entry_code` and `is_search_entry`.
  - name: CategoryMappings
    description: Independent category-to-ERP positioning skeleton. Maintains first-level ERP search-entry mappings and reserved secondary/tertiary search conditions without real ERP lookup yet.
  - name: CostRules
    description: Configurable cost-rule center skeleton. Supports governed rule maintenance, lineage read models, version/effective-window traceability, and minimal preview without a full rule-expression engine or approval platform.
  - name: Workbench
    description: Frontend-facing workbench bootstrap and saved-preference APIs using session-backed user scope.
  - name: ExportCenter
    description: Export-center skeleton. Persists export jobs and static template metadata over existing stable read models without real file generation or storage.
  - name: IntegrationCenter
    description: Integration-center boundary. Persists internal API call logs plus explicit execution attempts for mostly placeholder connectors, and also carries the narrow ERP Bridge product-filing trace used by task business-info filing. This is observability for the Bridge-owned mutation boundary, not a general-purpose ERP mutation surface on MAIN.
  - name: JSTSync8082
    description: Resident JST sync service contract (port 8082). Documented here for cross-service integration clarity; not served by 8080/8081 cmd/server runtime.
  - name: InternalPlaceholder
    description: Implemented internal-only placeholder APIs. Do not treat as frontend-ready.
  - name: MockPlaceholderOnly
    description: Mock or prototype-only APIs kept for temporary flows and demos.
  - name: V6-Legacy
    description: Legacy public routes documented for compatibility or retirement tracking only. Do not use them as canonical MAIN routes or new integration targets.
components:
  schemas:
    V7Role:
      type: string
      enum: [Member, SuperAdmin, HRAdmin, OrgAdmin, RoleAdmin, TeamLead, DesignDirector, DesignReviewer, Ops, Designer, Audit_A, Audit_B, Warehouse, Outsource, ERP, Admin, DepartmentAdmin, CustomizationReviewer, CustomizationOperator]
    Department:
      type: string
      description: Dynamic backend org-master department name. Values come from enabled `org_departments` rows exposed by `/v1/org/options`; this is no longer a fixed frontend enum. v1.0 business baseline is exactly `人事部`, `运营部`, `设计研发部`, `定制美工部`, `审核部`, `云仓部` (plus the system bucket `未分配`). Legacy names (`设计部`, `采购部`, `仓储部`, `烘焙仓储部`) remain only as disabled compatibility rows for historical integrity and are not returned by `/v1/org/options` nor accepted by registration / user admin / task create inputs.
    PlaceholderAuthMode:
      type: string
      enum: [debug_header_role_enforced, session_token_role_enforced]
    RequestActor:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        source: { type: string }
        auth_mode:
          $ref: '#/components/schemas/PlaceholderAuthMode'
    RouteAccessRule:
      type: object
      properties:
        method: { type: string }
        path: { type: string }
        readiness:
          $ref: '#/components/schemas/APIReadiness'
        required_roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        auth_mode:
          $ref: '#/components/schemas/PlaceholderAuthMode'
        session_required:
          type: boolean
        debug_compatible:
          type: boolean
    RuleTemplate:
      type: object
      properties:
        id: { type: integer }
        template_type: { type: string, enum: [cost-pricing, product-code, short-name] }
        config_json: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Incident:
      type: object
      properties:
        id: { type: integer }
        sku_id: { type: integer }
        job_id: { type: integer, nullable: true }
        status: { type: string }
        reason: { type: string }
        assignee_id: { type: integer, nullable: true }
        resolved_by: { type: integer, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
        closed_by: { type: integer, nullable: true }
        closed_at: { type: string, format: date-time, nullable: true }
        close_reason: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SystemPolicy:
      type: object
      properties:
        id: { type: integer }
        key: { type: string }
        value: { type: string }
        version: { type: integer }
        updated_by: { type: integer }
        updated_at: { type: string, format: date-time }
    SKU:
      type: object
      properties:
        id: { type: integer }
        sku_code: { type: string }
        name: { type: string }
        workflow_status: { type: string }
        current_ver_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SKUSyncStatusResult:
      type: object
      properties:
        sku:
          $ref: '#/components/schemas/SKU'
        latest_sequence: { type: integer }
        events:
          type: array
          items:
            type: object
            additionalProperties: true
    JSTUserImportResult:
      type: object
      properties:
        fetched_count: { type: integer }
        created_count: { type: integer }
        updated_count: { type: integer }
        disabled_count: { type: integer }
        mapping_failed_count: { type: integer }
        trace_updated_count: { type: integer }
        roles_written: { type: integer }
        errors:
          type: array
          items: { type: string }
    JSTUserImportPreviewResult:
      type: object
      properties:
        fetched_count: { type: integer }
        matched_count: { type: integer }
        to_create_count: { type: integer }
        to_update_count: { type: integer }
        org_mapping_missed:
          type: array
          items: { type: object, additionalProperties: true }
        role_mapping_missed:
          type: array
          items: { type: object, additionalProperties: true }
        risks:
          type: array
          items: { type: object, additionalProperties: true }
        preview_items:
          type: array
          items: { type: object, additionalProperties: true }
    AgentSyncResult:
      type: object
      properties:
        asset_version_id: { type: integer, nullable: true }
    PullJobResult:
      type: object
      properties:
        attempt_id: { type: integer, nullable: true }
        job:
          type: object
          additionalProperties: true
        lease_expires_at: { type: string, format: date-time, nullable: true }
    HeartbeatResult:
      type: object
      properties:
        lease_expires_at: { type: string, format: date-time, nullable: true }
    AuditSubmitResult:
      type: object
      properties:
        action: { type: string }
        jobs:
          type: array
          items: { type: object, additionalProperties: true }
    BatchTaskActionResult:
      type: object
      properties:
        batch_request_id: { type: string }
        total: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        items:
          type: array
          items: { type: object, additionalProperties: true }
    UserStatus:
      type: string
      enum: [active, disabled]
    EmploymentType:
      type: string
      enum: [full_time, part_time]
    JSTUser:
      type: object
      description: "JST getcompanyusers item. Source: domain.JSTUser."
      properties:
        u_id:
          type: integer
        name:
          type: string
        loginId:
          type: string
        enabled:
          type: boolean
        created:
          type: string
        modified:
          type: string
        last_login_time:
          type: string
        pwd_modified:
          type: string
        remark:
          type: string
        role_ids:
          type: string
        roles:
          type: string
        ug_ids:
          type: string
        ug_names:
          type: array
          items:
            type: string
        creator:
          type: string
        modifier:
          type: string
        empId:
          type: string
    JSTUserListResponse:
      type: object
      description: "ERP-style JST getcompanyusers response. Source: domain.JSTUserListResponse."
      properties:
        current_page:
          type: string
        page_size:
          type: string
        count:
          type: string
        pages:
          type: string
        datas:
          type: array
          items:
            $ref: '#/components/schemas/JSTUser'
    WorkflowUser:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        account: { type: string }
        display_name: { type: string }
        name: { type: string }
        department:
          $ref: '#/components/schemas/Department'
        team: { type: string }
        group: { type: string, description: Compatibility alias of team }
        mobile: { type: string }
        phone: { type: string }
        email: { type: string, nullable: true }
        managed_departments:
          type: array
          items:
            type: string
        managed_teams:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/UserStatus'
        employment_type:
          $ref: '#/components/schemas/EmploymentType'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        last_login_at:
          type: string
          format: date-time
          nullable: true
        jst_u_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        frontend_access:
          $ref: '#/components/schemas/FrontendAccess'
    CreateManagedUserRequest:
      type: object
      required: [username, display_name, department, team, mobile, password]
      properties:
        username:
          type: string
        account:
          type: string
          description: Compatibility alias of username.
        display_name:
          type: string
        name:
          type: string
          description: Compatibility alias of display_name.
        department:
          type: string
          description: Must match one enabled department from backend org master exposed by `/v1/org/options`.
        team:
          type: string
          description: Must match one enabled team under the selected department in backend org master exposed by `/v1/org/options`.
        group:
          type: string
          description: Compatibility alias of team.
        mobile:
          type: string
        phone:
          type: string
          description: Compatibility alias of mobile.
        email:
          type: string
          nullable: true
        password:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        status:
          $ref: '#/components/schemas/UserStatus'
        employment_type:
          $ref: '#/components/schemas/EmploymentType'
    ResetUserPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
    FrontendAccess:
      type: object
      properties:
        is_super_admin:
          type: boolean
        is_department_admin:
          type: boolean
        department:
          type: string
        team:
          type: string
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            type: string
        pages:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
        modules:
          type: array
          items:
            type: string
        managed_departments:
          type: array
          items:
            type: string
        permission_flags:
          type: array
          items:
            type: string
        page_keys:
          type: array
          items:
            type: string
        menu_keys:
          type: array
          items:
            type: string
        module_keys:
          type: array
          items:
            type: string
        access_scopes:
          type: array
          items:
            type: string
    DepartmentOption:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          $ref: '#/components/schemas/Department'
        teams:
          type: array
          items:
            type: string
        team_items:
          type: array
          items:
            $ref: '#/components/schemas/OrgTeamOption'
        enabled:
          type: boolean
    OrgTeamOption:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        enabled:
          type: boolean
    OrgDepartment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrgTeam:
      type: object
      properties:
        id:
          type: integer
          format: int64
        department_id:
          type: integer
          format: int64
        department:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateOrgDepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Unique department name in backend org master.
    UpdateOrgDepartmentRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Current backend update semantic is enable/disable only.
    CreateOrgTeamRequest:
      type: object
      required: [name]
      anyOf:
        - required: [department_id]
        - required: [department]
      properties:
        department_id:
          type: integer
          format: int64
          description: Backend org department id. Optional when `department` is provided.
        department:
          type: string
          description: Backend org department name. Optional when `department_id` is provided.
        name:
          type: string
          description: Globally unique team name in backend org master.
    UpdateOrgTeamRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Current backend update semantic is enable/disable only.
    RegistrationOptions:
      type: object
      properties:
        departments:
          type: array
          items:
            $ref: '#/components/schemas/DepartmentOption'
    ConfiguredUserAssignment:
      type: object
      properties:
        username:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        department:
          $ref: '#/components/schemas/Department'
        team:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        managed_departments:
          type: array
          items:
            type: string
        managed_teams:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/UserStatus'
    OrgOptions:
      type: object
      description: Canonical org-options payload. `departments[].teams` is the authoritative shape as of v1.8.
      properties:
        departments:
          type: array
          description: Canonical department tree. Each department entry carries its nested `teams` array.
          items:
            $ref: '#/components/schemas/DepartmentOption'
        teams_by_department:
          type: object
          deprecated: true
          description: "Deprecated compatibility mirror retained in v1.8. Clients should switch to `departments[].teams`. Responses that include this field emit `Deprecation: version=\"v1.8\"`."
          additionalProperties:
            type: array
            items:
              type: string
        role_catalog_summary:
          type: array
          items:
            $ref: '#/components/schemas/RoleCatalogEntry'
        unassigned_pool_enabled:
          type: boolean
        configured_assignments:
          type: array
          items:
            $ref: '#/components/schemas/ConfiguredUserAssignment'
    AuthSession:
      type: object
      properties:
        session_id: { type: string }
        token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_at:
          type: string
          format: date-time
    AuthResult:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/WorkflowUser'
        session:
          $ref: '#/components/schemas/AuthSession'
    RoleCatalogEntry:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/V7Role'
        name: { type: string }
        description: { type: string }
        capabilities:
          type: array
          items:
            type: string
    PermissionLog:
      type: object
      properties:
        id: { type: integer }
        actor_id:
          type: integer
          nullable: true
        actor_username: { type: string }
        actor_source: { type: string }
        auth_mode:
          $ref: '#/components/schemas/PlaceholderAuthMode'
        readiness:
          $ref: '#/components/schemas/APIReadiness'
        session_required:
          type: boolean
        debug_compatible:
          type: boolean
        action_type: { type: string }
        actor_roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        target_user_id:
          type: integer
          nullable: true
        target_username: { type: string }
        target_roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        method: { type: string }
        route_path: { type: string }
        required_roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        granted: { type: boolean }
        reason: { type: string }
        created_at:
          type: string
          format: date-time
    OperationLogSource:
      type: string
      enum: [task_event, export_event, integration_call]
    OperationLogEntry:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/OperationLogSource'
        log_id: { type: string }
        reference_type: { type: string }
        reference_id: { type: string }
        event_type: { type: string }
        summary: { type: string }
        actor_id:
          type: integer
          nullable: true
        actor_type: { type: string }
        status: { type: string }
        payload: {}
        created_at:
          type: string
          format: date-time
    PolicyMode:
      type: string
      description: |
        Policy scaffolding mode.
        Indicates route-role visibility scaffolding only.
        This does not imply an identity provider, org sync, or full RBAC/ABAC engine.
      enum: [route_role_visibility_scaffolding]
    PolicyAPISurface:
      type: string
      description: Endpoint exposure classification used by policy scaffolding action summaries.
      enum: [frontend_ready, internal, admin, mock_placeholder]
    ActionPolicySummary:
      type: object
      description: Default action-level policy summary for scaffolding only.
      properties:
        action_key:
          type: string
        allowed_roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        api_surface:
          $ref: '#/components/schemas/PolicyAPISurface'
        note:
          type: string
    ResourceAccessPolicy:
      type: object
      description: Default resource-level policy summary for scaffolding only.
      properties:
        resource_key:
          type: string
        visible_to_roles:
          type: array
          items:
            $ref: '#/components/schemas/V7Role'
        action_roles:
          type: array
          items:
            $ref: '#/components/schemas/ActionPolicySummary'
        policy_mode:
          $ref: '#/components/schemas/PolicyMode'
    PolicyScopeSummary:
      type: object
      description: Cross-center policy scaffolding envelope. Not a real auth/org system.
      properties:
        scope_key:
          type: string
        scope_name:
          type: string
        auth_mode:
          $ref: '#/components/schemas/PlaceholderAuthMode'
        policy_mode:
          $ref: '#/components/schemas/PolicyMode'
        resource_access_policy:
          $ref: '#/components/schemas/ResourceAccessPolicy'
        is_placeholder:
          type: boolean
        note:
          type: string
    PlatformEntryMode:
      type: string
      description: |
        Platform-entry boundary mode placeholder.
        This does not imply a BI platform, finance/accounting system, or report engine.
      enum: [scaffolding_only]
    PlatformEntryStatus:
      type: string
      description: Entry-readiness status for one platform-entry placeholder lane.
      enum: [candidate, conditional, not_applicable]
    KPIEntrySummary:
      type: object
      description: Placeholder KPI entry summary for future KPI docking. Not a real KPI computation module.
      properties:
        entry_status:
          $ref: '#/components/schemas/PlatformEntryStatus'
        eligible_now:
          type: boolean
        source_read_model_fields:
          type: array
          items:
            type: string
        placeholder_fields:
          type: array
          items:
            type: string
        future_metric_hints:
          type: array
          items:
            type: string
        is_placeholder:
          type: boolean
        not_ready_blocking_reason:
          type: string
        note:
          type: string
    FinanceEntrySummary:
      type: object
      description: Placeholder finance entry summary for future finance docking. Not a real accounting/reconciliation/settlement/invoice system.
      properties:
        entry_status:
          $ref: '#/components/schemas/PlatformEntryStatus'
        eligible_now:
          type: boolean
        source_read_model_fields:
          type: array
          items:
            type: string
        placeholder_fields:
          type: array
          items:
            type: string
        future_finance_scope_hints:
          type: array
          items:
            type: string
        is_placeholder:
          type: boolean
        not_ready_blocking_reason:
          type: string
        note:
          type: string
    ReportEntrySummary:
      type: object
      description: Placeholder report/export entry summary for future report-platform docking. Not a real report-generation engine.
      properties:
        entry_status:
          $ref: '#/components/schemas/PlatformEntryStatus'
        eligible_now:
          type: boolean
        source_read_model_fields:
          type: array
          items:
            type: string
        placeholder_fields:
          type: array
          items:
            type: string
        future_report_scope_hints:
          type: array
          items:
            type: string
        is_placeholder:
          type: boolean
        not_ready_blocking_reason:
          type: string
        note:
          type: string
    PlatformEntryBoundary:
      type: object
      description: Unified platform-entry boundary envelope reused across task, procurement, cost-governance, and export read models.
      properties:
        entry_mode:
          $ref: '#/components/schemas/PlatformEntryMode'
        scope_key:
          type: string
        scope_name:
          type: string
        source_object:
          type: string
        source_layer:
          type: string
        kpi_entry_summary:
          allOf: [{ $ref: '#/components/schemas/KPIEntrySummary' }]
          nullable: true
        finance_entry_summary:
          allOf: [{ $ref: '#/components/schemas/FinanceEntrySummary' }]
          nullable: true
        report_entry_summary:
          allOf: [{ $ref: '#/components/schemas/ReportEntrySummary' }]
          nullable: true
        is_placeholder:
          type: boolean
        note:
          type: string
    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
    ServerLog:
      type: object
      properties:
        id: { type: integer }
        level: { type: string }
        msg: { type: string }
        details: { type: object }
        created_at: { type: string, format: date-time }
    TaskBoardView:
      type: string
      enum: [all, ops, designer, audit, procurement, warehouse]
    TaskMainStatus:
      type: string
      enum: [draft, created, filed, pending_warehouse_receive, warehouse_processing, pending_close, closed]
    TaskSubStatusCode:
      type: string
      enum:
        - not_required
        - not_triggered
        - not_started
        - pending_design
        - designing
        - rework_required
        - pending_audit
        - in_review
        - rejected
        - outsourcing
        - outsourced
        - preparing
        - ready
        - in_progress
        - pending_inbound
        - pending_receive
        - received
        - completed
        - pending_review
        - final_ready
        - approved
        - reserved
    TaskSubStatusSource:
      type: string
      enum: [task_type, task_status, task_asset, warehouse_receipt, procurement_record, reserved]
    TaskSubStatusItem:
