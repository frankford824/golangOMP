      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Notification marked read }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the notification owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/me/notifications/read-all:
    post:
      summary: Mark all notifications as read
      description: |
        Source: V1_INFORMATION_ARCHITECTURE §8.3. Scoped to the authenticated user; UPDATE targets
        `notifications WHERE user_id = current_user AND is_read = 0`.
      tags: [Me, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-C
      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      responses:
        '204': { description: All notifications marked read }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/me/notifications/unread-count:
    get:
      summary: Get unread notification count
      description: |
        Source: V1_INFORMATION_ARCHITECTURE §8.3 (右上角 badge 用). Counts `notifications WHERE user_id =
        current_user AND is_read = 0`.
      tags: [Me, ReadyForFrontend]
      x-api-readiness: ready_for_frontend
      x-owner-round: R4-SA-C
      x-rbac-placeholder:
        auth_mode: session_token_authenticated
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      unread_count:
                        type: integer
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/me:
    get:
