openapi: 3.0.3
paths:
  /v1/tasks/{id}:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TaskDTO"
components:
  schemas:
    TaskDTO:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
